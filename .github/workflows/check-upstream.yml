name: Check upstream updates

permissions:
  contents: read
  issues: write

on:
  schedule:
    # 02:00 UTC = 10:00 Asia/Shanghai
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  UPSTREAM_REPO: immortalwrt/homeproxy
  UPSTREAM_BRANCH: master
  CUSTOM_BRANCH: custom/homeproxy-enhancements
  ISSUE_LABEL: upstream-update
  ISSUE_TITLE: HomeProxy upstream has updates

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout custom branch
        uses: actions/checkout@v6
        with:
          ref: custom/homeproxy-enhancements
          fetch-depth: 0

      - name: Compare with upstream
        id: compare
        run: |
          set -euo pipefail

          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git" 2>/dev/null || true
          git fetch --no-tags upstream "${UPSTREAM_BRANCH}"

          upstream_ref="upstream/${UPSTREAM_BRANCH}"
          upstream_ahead="$(git rev-list --count "HEAD..${upstream_ref}")"
          upstream_sha="$(git rev-parse "${upstream_ref}")"
          custom_sha="$(git rev-parse HEAD)"

          git log --oneline --max-count=20 "HEAD..${upstream_ref}" > upstream_commits.txt

          {
            echo "upstream_ahead=${upstream_ahead}"
            echo "upstream_sha=${upstream_sha}"
            echo "custom_sha=${custom_sha}"
          } >> "${GITHUB_OUTPUT}"

          if [ "${upstream_ahead}" -gt 0 ]; then
            echo "::warning title=Upstream HomeProxy updated::${UPSTREAM_REPO}/${UPSTREAM_BRANCH} has ${upstream_ahead} commit(s) not yet merged into ${CUSTOM_BRANCH}."
          else
            echo "::notice title=Upstream HomeProxy checked::${CUSTOM_BRANCH} already contains ${UPSTREAM_REPO}/${UPSTREAM_BRANCH}."
          fi

      - name: Create or update upstream update issue
        if: steps.compare.outputs.upstream_ahead != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          UPSTREAM_AHEAD: ${{ steps.compare.outputs.upstream_ahead }}
          UPSTREAM_SHA: ${{ steps.compare.outputs.upstream_sha }}
          CUSTOM_SHA: ${{ steps.compare.outputs.custom_sha }}
        run: |
          set -euo pipefail

          if ! gh label create "${ISSUE_LABEL}" \
            --description "Upstream HomeProxy has commits not merged into the custom branch" \
            --color "fbca04" 2>label-create-error.txt; then
            if ! grep -qi "already exists" label-create-error.txt; then
              cat label-create-error.txt >&2
              exit 1
            fi
          fi

          issue_number="$(gh issue list --state open --label "${ISSUE_LABEL}" --json number --jq '.[0].number // ""' 2>/dev/null || true)"
          body_file="$(mktemp)"

          {
            echo "Detected ${UPSTREAM_AHEAD} upstream commit(s) not yet merged into \`${CUSTOM_BRANCH}\`."
            echo
            echo "- Upstream: \`${UPSTREAM_REPO}/${UPSTREAM_BRANCH}\`"
            echo "- Upstream HEAD: \`${UPSTREAM_SHA}\`"
            echo "- Custom HEAD: \`${CUSTOM_SHA}\`"
            echo
            echo "Recent upstream commits:"
            echo
            echo '```text'
            cat upstream_commits.txt
            echo '```'
            echo
            echo "Maintenance instructions:"
            echo
            echo "1. Open \`README.md\`."
            echo "2. Follow the section \`HomeProxy 上游更新后怎么办\`."
            echo "3. Merge upstream, resolve conflicts, run checks, push the custom branch, then publish a new custom release."
          } > "${body_file}"

          if [ -n "${issue_number}" ]; then
            gh issue edit "${issue_number}" --title "${ISSUE_TITLE}" --add-label "${ISSUE_LABEL}"
            gh issue comment "${issue_number}" --body-file "${body_file}"
          else
            gh issue create --title "${ISSUE_TITLE}" --label "${ISSUE_LABEL}" --body-file "${body_file}"
          fi

      - name: Close resolved upstream update issue
        if: steps.compare.outputs.upstream_ahead == '0'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          issue_number="$(gh issue list --state open --label "${ISSUE_LABEL}" --json number --jq '.[0].number // ""' 2>/dev/null || true)"
          if [ -n "${issue_number}" ]; then
            gh issue close "${issue_number}" \
              --comment "The custom branch now contains ${UPSTREAM_REPO}/${UPSTREAM_BRANCH}."
          fi
