name: Build ipk for HomeProxy

permissions:
  contents: read

on:
  workflow_dispatch:

  push:
    branches:
      - 'master'
      - 'dev'
      - 'custom/**'
    paths:
      - 'htdocs/**'
      - 'po/**'
      - 'root/**'
      - 'Makefile'
      - '.github/**'
      - '!.github/ISSUE_TEMPLATE/**'

  pull_request:
    branches:
      - 'master'
      - 'dev'
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'htdocs/**'
      - 'root/**'
      - 'Makefile'
      - '.github/**'
      - '!.github/ISSUE_TEMPLATE/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source tree
        uses: actions/checkout@v6

      - name: Checkout apk
        uses: actions/checkout@v6
        with:
          repository: 'alpinelinux/apk-tools'
          path: 'apk-tools'
          fetch-depth: 0
          ref: 'b5a31c0d865342ad80be10d68f1bb3d3ad9b0866'

      - name: Checkout po2lmo
        uses: actions/checkout@v6
        with:
          repository: 'openwrt/luci'
          path: 'po2lmo'
          sparse-checkout: 'modules/luci-base/src'

      - name: Cache apk-tools build
        uses: actions/cache@v4
        with:
          path: apk-tools/build
          key: ${{ runner.os }}-apk-tools-${{ hashFiles('apk-tools/**/*.c', 'apk-tools/**/*.h', 'apk-tools/**/meson.build') }}
          restore-keys: |
            ${{ runner.os }}-apk-tools-

      - name: Setup dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E rm -rf /var/lib/man-db/auto-update
          sudo -E apt-get update -qq
          sudo -E apt-get install -y build-essential curl fakeroot libssl-dev lua5.1 meson ninja-build nodejs

          pushd apk-tools
          # The cached builddir (actions/cache) is already configured; a plain
          # `meson setup build` errors on an existing builddir, so reconfigure
          # in place when we got a cache hit and configure fresh otherwise.
          meson_reconfigure=""
          if [ -f build/meson-info/meson-info.json ]; then
            meson_reconfigure="--reconfigure"
          fi
          meson setup build $meson_reconfigure \
            -Db_lto=true \
            -Dcompressed-help=false \
            -Ddocs=disabled \
            -Dhelp=enabled \
            -Dlua_version=5.1 \
            -Ddefault_library=static \
            -Durl_backend=wget \
            -Dzstd=false \
            -Dpython=disabled \
            -Dtests=disabled \
            -Dcrypto_backend=openssl
          ninja -C build
          sudo -E meson install -C build --strip
          popd

          pushd po2lmo/modules/luci-base/src
          make po2lmo
          sudo -E install -m0755 -s po2lmo /usr/local/bin/po2lmo
          popd

          curl -fLO "https://raw.githubusercontent.com/openwrt/openwrt/master/scripts/ipkg-build"
          sudo install -m0755 ipkg-build /usr/local/bin/ipkg-build

      - name: Syntax check
        run: |
          echo "Checking shell scripts..."
          sh -n install.sh

          echo "Checking JavaScript files..."
          node --check htdocs/luci-static/resources/homeproxy.js
          node --check htdocs/luci-static/resources/view/homeproxy/client.js
          node --check htdocs/luci-static/resources/view/homeproxy/node.js
          node --check htdocs/luci-static/resources/view/homeproxy/backup.js

          echo "Checking ucode scripts..."
          # Check .uc files with Node.js (basic syntax only)
          for uc_file in root/etc/homeproxy/scripts/*.uc; do
            if [ -f "$uc_file" ]; then
              echo "  Checking $uc_file..."
              node --check --input-type=module < "$uc_file" || {
                echo "ERROR: Syntax error in $uc_file"
                exit 1
              }
            fi
          done

          # Check RPC file (luci.homeproxy) - convert top-level return for Node.js
          for rpc_file in root/usr/share/rpcd/ucode/luci.homeproxy; do
            if [ -f "$rpc_file" ]; then
              echo "  Checking $rpc_file (RPC handler with top-level return workaround)..."
              sed 's/^return /export default /' "$rpc_file" | node --check --input-type=module || {
                echo "ERROR: Syntax error in $rpc_file"
                exit 1
              }
            fi
          done

          echo "All syntax checks passed"

      - name: Build ipk file
        run: |
          pushd .github
          CUSTOM_PKG_NAME="homeproxy-custom" \
            CUSTOM_PKG_DESCRIPTION="HomeProxy 修改版，内置简体中文；支持 Surge 格式节点订阅、连通性测试、SS2022 + ShadowTLS、Selector 路由节点、路由规则直选节点、HomeProxy 配置备份 / 恢复、默认开启 Clash API、MetaCubeXD 面板入口，并隐藏 SS2022 + ShadowTLS 生成的cfg-xxx-out-shadowtls 中间层节点。" \
            fakeroot bash build-ipk.sh apk "${{ github.event_name }}"
          CUSTOM_PKG_NAME="homeproxy-custom" \
            CUSTOM_PKG_DESCRIPTION="HomeProxy 修改版，内置简体中文；支持 Surge 格式节点订阅、连通性测试、SS2022 + ShadowTLS、Selector 路由节点、路由规则直选节点、HomeProxy 配置备份 / 恢复、默认开启 Clash API、MetaCubeXD 面板入口，并隐藏 SS2022 + ShadowTLS 生成的cfg-xxx-out-shadowtls 中间层节点。" \
            fakeroot bash build-ipk.sh ipk "${{ github.event_name }}"
          popd

      - name: Publishing APK files to GitHub Artifacts
        uses: actions/upload-artifact@v7
        if: github.event_name != 'release'
        with:
          name: homeproxy-apk-packages
          path: .github/*.apk
          include-hidden-files: true
          if-no-files-found: error

      - name: Publishing IPK files to GitHub Artifacts
        uses: actions/upload-artifact@v7
        if: github.event_name != 'release'
        with:
          name: homeproxy-ipk-packages
          path: .github/*.ipk
          include-hidden-files: true
          if-no-files-found: error
