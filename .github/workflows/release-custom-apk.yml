name: Release custom APK

permissions:
  contents: write

on:
  push:
    tags:
      - 'custom-*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source tree
        uses: actions/checkout@v6

      - name: Checkout apk
        uses: actions/checkout@v6
        with:
          repository: 'alpinelinux/apk-tools'
          path: 'apk-tools'
          fetch-depth: 0
          ref: 'b5a31c0d865342ad80be10d68f1bb3d3ad9b0866'

      - name: Checkout po2lmo
        uses: actions/checkout@v6
        with:
          repository: 'openwrt/luci'
          path: 'po2lmo'
          sparse-checkout: 'modules/luci-base/src'

      - name: Setup dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E rm -rf /var/lib/man-db/auto-update
          sudo -E apt-get update -qq
          sudo -E apt-get install -y build-essential curl fakeroot libssl-dev lua5.1 meson ninja-build

          pushd apk-tools
          meson setup build \
            -Db_lto=true \
            -Dcompressed-help=false \
            -Ddocs=disabled \
            -Dhelp=enabled \
            -Dlua_version=5.1 \
            -Ddefault_library=static \
            -Durl_backend=wget \
            -Dzstd=false \
            -Dpython=disabled \
            -Dtests=disabled \
            -Dcrypto_backend=openssl
          ninja -C build
          sudo -E meson install -C build --strip
          popd

          pushd po2lmo/modules/luci-base/src
          make po2lmo
          sudo -E install -m0755 -s po2lmo /usr/local/bin/po2lmo
          popd

          curl -fLO "https://raw.githubusercontent.com/openwrt/openwrt/master/scripts/ipkg-build"
          sudo install -m0755 ipkg-build /usr/local/bin/ipkg-build

      - name: Prepare custom version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" =~ ^custom-([0-9]{8})-([0-9A-Fa-f]+)$ ]]; then
            release_date="${BASH_REMATCH[1]}"
            release_sha="${BASH_REMATCH[2],,}"
          else
            echo "Unsupported custom release tag: $tag" >&2
            echo "Expected tag format: custom-YYYYMMDD-<hex-commit>" >&2
            exit 1
          fi
          release_time="$(TZ=Asia/Shanghai date -d "@$(git show -s --format=%ct HEAD)" +%H%M%S)"
          apk_version="${release_date}.${release_time}~${release_sha}"
          echo "Prepared custom APK version: $apk_version"

          {
            echo "HOMEPROXY_APK_VERSION=$apk_version"
          } >> "$GITHUB_ENV"

      - name: Build APK
        env:
          HOMEPROXY_APK_SIGN_KEY: ${{ secrets.HOMEPROXY_APK_SIGN_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEPROXY_APK_SIGN_KEY}" ]; then
            echo "HOMEPROXY_APK_SIGN_KEY secret is required" >&2
            exit 1
          fi

          # Setup trap to clean private key on exit/failure
          cleanup_key() {
            if [ -f "homeproxy-custom.key" ]; then
              shred -u homeproxy-custom.key 2>/dev/null || rm -f homeproxy-custom.key
            fi
          }
          trap cleanup_key EXIT INT TERM

          umask 077
          printf '%s\n' "${HOMEPROXY_APK_SIGN_KEY}" > homeproxy-custom.key
          openssl pkey -in homeproxy-custom.key -pubout -out homeproxy-custom.pem
          pushd .github
          CUSTOM_PKG_NAME="homeproxy-custom" \
            CUSTOM_PKG_VERSION="${HOMEPROXY_APK_VERSION}" \
            CUSTOM_PKG_DESCRIPTION="HomeProxy 修改版，内置简体中文；支持 SS2022 + ShadowTLS、Selector 路由节点、路由规则直选节点、HomeProxy 配置备份 / 恢复、默认开启 Clash API、MetaCubeXD 面板入口，并隐藏 SS2022 + ShadowTLS 生成的cfg-xxx-out-shadowtls 中间层节点。" \
            APK_SIGN_KEY="../homeproxy-custom.key" \
            fakeroot bash build-ipk.sh apk "snapshot"
          popd

          # Explicitly cleanup after successful build
          cleanup_key
          trap - EXIT INT TERM

      - name: Prepare release assets
        env:
          HOMEPROXY_APK_SIGN_KEY: ${{ secrets.HOMEPROXY_APK_SIGN_KEY }}
        run: |
          set -euo pipefail

          # Setup trap to clean private key on exit/failure
          cleanup_key() {
            if [ -f "homeproxy-custom.key" ]; then
              shred -u homeproxy-custom.key 2>/dev/null || rm -f homeproxy-custom.key
            fi
          }
          trap cleanup_key EXIT INT TERM

          # Re-create private key for Packages.adb signing
          umask 077
          printf '%s\n' "${HOMEPROXY_APK_SIGN_KEY}" > homeproxy-custom.key

          app_apk_file="$(ls .github/homeproxy-custom_*.apk | head -n 1)"
          cp "$app_apk_file" homeproxy-custom_all.apk

          mkdir -p apk-keys
          cp homeproxy-custom.pem apk-keys/

          apk --keys-dir "$PWD/apk-keys" mkndx \
            --sign-key homeproxy-custom.key \
            --description "HomeProxy Custom ${HOMEPROXY_APK_VERSION}" \
            --pkgname-spec '${name}_all.apk' \
            --output Packages.adb \
            homeproxy-custom_all.apk

          # Clean up private key immediately after signing
          cleanup_key
          trap - EXIT INT TERM
          cat > RELEASE_NOTES.md <<'EOF'
          ## HomeProxy Custom

          基于 https://github.com/immortalwrt/homeproxy 的自定义版本。

          ### 本版本变更

          - 支持 Surge/Clash 托管配置格式订阅（YAML 风格 `proxies:`），可直接导入 `trojan`、`ss`、`hysteria2` / `hy2`、`anytls` 节点。
          - 新增 Surge 节点字段映射：Trojan WebSocket、SS2022 + ShadowTLS、UDP-over-TCP、Hysteria2 salamander obfs、port-hopping、ALPN、SNI、skip-cert-verify 等字段会写入 HomeProxy 现有 UCI schema。
          - 修复 Hysteria2 `port-hopping` 范围格式，将 Surge 的 `start-end` 转换为 sing-box 所需的 `start:end`。
          - 加固订阅解析边界：仅 Surge 解析分支产出的对象会跳过 URI 解析，避免任意 JSON 对象绕过原有白名单映射；同时保留 JSON、SIP008、Base64 URI 列表和明文 URI 列表原有路径。
          - 增强 Surge 行解析兼容性：支持 `Name=...` / `Name  =  ...`、大小写不同的 option key、引号内逗号，以及未加引号的多段 `port-hopping`。
          - 已在 ImmortalWrt 25.12.0 / sing-box 1.12.25 上用真实 Surge 订阅验证，`🇸🇬ss.2022+ShadowTLS` 与 `🇸🇬Hy2` 节点均通过 `sing-box tools fetch` 出站连通测试。
          EOF

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          title="HomeProxy Custom ${HOMEPROXY_APK_VERSION}"
          assets=(
            homeproxy-custom_all.apk
            Packages.adb
            homeproxy-custom.pem
          )
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "$title" \
              --notes-file RELEASE_NOTES.md \
              --latest
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" \
              --title "$title" \
              --notes-file RELEASE_NOTES.md \
              --latest
          fi
