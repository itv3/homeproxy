name: Release custom APK

permissions:
  contents: write

on:
  push:
    tags:
      - 'custom-*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source tree
        uses: actions/checkout@v6

      - name: Checkout apk
        uses: actions/checkout@v6
        with:
          repository: 'alpinelinux/apk-tools'
          path: 'apk-tools'
          fetch-depth: 0
          ref: 'b5a31c0d865342ad80be10d68f1bb3d3ad9b0866'

      - name: Checkout po2lmo
        uses: actions/checkout@v6
        with:
          repository: 'openwrt/luci'
          path: 'po2lmo'
          sparse-checkout: 'modules/luci-base/src'

      - name: Setup dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E rm -rf /var/lib/man-db/auto-update
          sudo -E apt-get update -qq
          sudo -E apt-get install -y build-essential curl fakeroot libssl-dev lua5.1 meson ninja-build

          pushd apk-tools
          meson setup build \
            -Db_lto=true \
            -Dcompressed-help=false \
            -Ddocs=disabled \
            -Dhelp=enabled \
            -Dlua_version=5.1 \
            -Ddefault_library=static \
            -Durl_backend=wget \
            -Dzstd=false \
            -Dpython=disabled \
            -Dtests=disabled \
            -Dcrypto_backend=openssl
          ninja -C build
          sudo -E meson install -C build --strip
          popd

          pushd po2lmo/modules/luci-base/src
          make po2lmo
          sudo -E install -m0755 -s po2lmo /usr/local/bin/po2lmo
          popd

          curl -fLO "https://raw.githubusercontent.com/openwrt/openwrt/master/scripts/ipkg-build"
          sudo install -m0755 ipkg-build /usr/local/bin/ipkg-build

      - name: Build APK
        env:
          HOMEPROXY_APK_SIGN_KEY: ${{ secrets.HOMEPROXY_APK_SIGN_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEPROXY_APK_SIGN_KEY}" ]; then
            echo "HOMEPROXY_APK_SIGN_KEY secret is required" >&2
            exit 1
          fi
          umask 077
          printf '%s\n' "${HOMEPROXY_APK_SIGN_KEY}" > homeproxy-custom.key
          openssl pkey -in homeproxy-custom.key -pubout -out homeproxy-custom.pem
          pushd .github
          APK_SIGN_KEY="../homeproxy-custom.key" fakeroot bash build-ipk.sh apk "snapshot"
          popd

      - name: Prepare release assets
        run: |
          set -euo pipefail
          app_apk_file="$(ls .github/luci-app-homeproxy_*.apk | head -n 1)"
          i18n_apk_file="$(ls .github/luci-i18n-homeproxy-zh-cn_*.apk | head -n 1)"
          app_version="$(basename "$app_apk_file" | sed -e 's/^luci-app-homeproxy_//' -e 's/_all\\.apk$//')"
          i18n_version="$(basename "$i18n_apk_file" | sed -e 's/^luci-i18n-homeproxy-zh-cn_//' -e 's/_all\\.apk$//')"
          versioned_app_apk="luci-app-homeproxy-${app_version}.apk"
          versioned_i18n_apk="luci-i18n-homeproxy-zh-cn-${i18n_version}.apk"
          cp "$app_apk_file" "$versioned_app_apk"
          cp "$i18n_apk_file" "$versioned_i18n_apk"
          cp "$app_apk_file" luci-app-homeproxy-custom_all.apk
          {
            echo "VERSIONED_APP_APK=${versioned_app_apk}"
            echo "VERSIONED_I18N_APK=${versioned_i18n_apk}"
          } >> "$GITHUB_ENV"

          apk mkndx \
            --sign-key homeproxy-custom.key \
            --description "HomeProxy Custom ${GITHUB_REF_NAME}" \
            --output Packages.adb \
            "$versioned_app_apk" "$versioned_i18n_apk"

          echo "ndx https://github.com/itv3/homeproxy/releases/download/${GITHUB_REF_NAME}/Packages.adb" > homeproxy-custom.list

          sha256sum \
            luci-app-homeproxy-custom_all.apk \
            "$versioned_app_apk" \
            "$versioned_i18n_apk" \
            Packages.adb \
            homeproxy-custom.pem \
            homeproxy-custom.list > SHA256SUMS.txt
          cat > RELEASE_NOTES.md <<'EOF'
          ## HomeProxy Custom

          基于 https://github.com/immortalwrt/homeproxy 的自定义版本。

          ### 本版本变更

          - APK 使用 HomeProxy Custom 公钥签名，支持导入公钥后通过 WebUI 上传安装
          - 发布 v3 软件源索引 `Packages.adb`，支持添加软件源后通过软件包管理器安装 / 升级
          - 单独发布 `luci-i18n-homeproxy-zh-cn` 翻译包，简体中文界面不再依赖官方翻译包版本

          ### 一键安装

          \`\`\`sh
          wget -O - https://github.com/itv3/homeproxy/raw/refs/heads/custom/homeproxy-enhancements/install.sh | ash
          \`\`\`

          ### WebUI 安装

          1. 在「软件包仓库公钥」里添加 `homeproxy-custom.pem`。
          2. 在「软件包」里上传 `luci-app-homeproxy-custom_all.apk` 安装 / 升级。
          3. 如需同步更新中文翻译，继续上传 `luci-i18n-homeproxy-zh-cn-<version>.apk`，或使用一键安装 / 软件源方式。

          ### 软件源

          添加 `homeproxy-custom.list` 后，软件包管理器可直接安装 / 升级 `luci-app-homeproxy` 和 `luci-i18n-homeproxy-zh-cn`。
          EOF

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          title="HomeProxy Custom ${tag#custom-}"
          assets=(
            luci-app-homeproxy-custom_all.apk
            "${VERSIONED_APP_APK}"
            "${VERSIONED_I18N_APK}"
            Packages.adb
            homeproxy-custom.pem
            homeproxy-custom.list
            SHA256SUMS.txt
          )
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" \
              --title "$title" \
              --notes-file RELEASE_NOTES.md \
              --latest
          fi
