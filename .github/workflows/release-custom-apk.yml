name: Release custom APK

permissions:
  contents: write

on:
  push:
    tags:
      - 'custom-*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source tree
        uses: actions/checkout@v6

      - name: Checkout apk
        uses: actions/checkout@v6
        with:
          repository: 'alpinelinux/apk-tools'
          path: 'apk-tools'
          fetch-depth: 0
          ref: 'b5a31c0d865342ad80be10d68f1bb3d3ad9b0866'

      - name: Checkout po2lmo
        uses: actions/checkout@v6
        with:
          repository: 'openwrt/luci'
          path: 'po2lmo'
          sparse-checkout: 'modules/luci-base/src'

      - name: Setup dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E rm -rf /var/lib/man-db/auto-update
          sudo -E apt-get update -qq
          sudo -E apt-get install -y build-essential curl fakeroot libssl-dev lua5.1 meson ninja-build

          pushd apk-tools
          meson setup build \
            -Db_lto=true \
            -Dcompressed-help=false \
            -Ddocs=disabled \
            -Dhelp=enabled \
            -Dlua_version=5.1 \
            -Ddefault_library=static \
            -Durl_backend=wget \
            -Dzstd=false \
            -Dpython=disabled \
            -Dtests=disabled \
            -Dcrypto_backend=openssl
          ninja -C build
          sudo -E meson install -C build --strip
          popd

          pushd po2lmo/modules/luci-base/src
          make po2lmo
          sudo -E install -m0755 -s po2lmo /usr/local/bin/po2lmo
          popd

          curl -fLO "https://raw.githubusercontent.com/openwrt/openwrt/master/scripts/ipkg-build"
          sudo install -m0755 ipkg-build /usr/local/bin/ipkg-build

      - name: Build APK
        env:
          HOMEPROXY_APK_SIGN_KEY: ${{ secrets.HOMEPROXY_APK_SIGN_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEPROXY_APK_SIGN_KEY}" ]; then
            echo "HOMEPROXY_APK_SIGN_KEY secret is required" >&2
            exit 1
          fi
          umask 077
          printf '%s\n' "${HOMEPROXY_APK_SIGN_KEY}" > homeproxy-custom.key
          openssl pkey -in homeproxy-custom.key -pubout -out homeproxy-custom.pem
          pushd .github
          CUSTOM_PKG_NAME="homeproxy-custom" \
            CUSTOM_PKG_DESCRIPTION="HomeProxy 修改版，内置简体中文；支持 SS2022 + ShadowTLS、Selector 路由节点、路由规则直选节点、配置导入导出、HomeProxy 源配置备份 / 恢复、默认开启 Clash API、MetaCubeXD 面板入口，并隐藏  SS2022 + ShadowTLS 生成的cfg-xxx-out-shadowtls 中间层节点。" \
            APK_SIGN_KEY="../homeproxy-custom.key" \
            fakeroot bash build-ipk.sh apk "snapshot"
          popd

      - name: Prepare release assets
        run: |
          set -euo pipefail
          app_apk_file="$(ls .github/homeproxy-custom_*.apk | head -n 1)"
          app_apk_base="$(basename "$app_apk_file")"
          cp "$app_apk_file" homeproxy-custom_all.apk

          mkdir -p apk-keys
          cp homeproxy-custom.pem apk-keys/

          apk --keys-dir "$PWD/apk-keys" mkndx \
            --sign-key homeproxy-custom.key \
            --description "HomeProxy Custom ${GITHUB_REF_NAME}" \
            --output Packages.adb \
            "$app_apk_file"
          cat > RELEASE_NOTES.md <<'EOF'
          ## HomeProxy Custom

          基于 https://github.com/immortalwrt/homeproxy 的自定义版本。

          ### 本版本变更

          - APK 包名改为 `homeproxy-custom`，用于和上游 `luci-app-homeproxy` 区分
          - `homeproxy-custom` 会替换上游 `luci-app-homeproxy` 的文件，并内置简体中文翻译
          - APK 使用 HomeProxy Custom 公钥签名，支持导入公钥后通过 WebUI 上传安装
          - 发布 v3 软件源索引 `Packages.adb`，支持添加软件源后通过软件包管理器安装 / 升级
          - 不需要再单独安装 `luci-i18n-homeproxy-zh-cn`

          ### 安装场景

          - 从未安装过 HomeProxy：可直接安装 `homeproxy-custom`
          - 已安装上游 `luci-app-homeproxy`：安装 `homeproxy-custom` 会替换原版文件
          - 已删除上游 `luci-app-homeproxy`：可直接安装 `homeproxy-custom`

          ### 一键安装（推荐，尤其适合从原版 HomeProxy 迁移）

          ```sh
          wget -O - https://github.com/itv3/homeproxy/raw/refs/heads/custom/homeproxy-enhancements/install.sh | ash
          ```

          ### WebUI 安装 / 升级（推荐：添加软件源）

          1. 下载 `homeproxy-custom.pem`。
          2. 进入 OpenWrt WebUI：「系统」->「管理权」->「软件包仓库公钥」，把 `homeproxy-custom.pem` 文件拖进输入框，添加软件包仓库公钥。
          3. 进入「系统」->「软件包」->「配置 apk」，在 `/etc/apk/repositories.d/customfeeds.list` 输入框内追加：

          ```text
          https://github.com/itv3/homeproxy/releases/latest/download/Packages.adb
          ```

          4. 回到「系统」->「软件包」页面，点击「更新列表」，搜索 `homeproxy-custom` 安装。
          5. 以后有新版本，更新列表后可在这个页面直接升级 `homeproxy-custom`。

          安装 `homeproxy-custom` 后，不需要再安装列表中的 `luci-app-homeproxy` 或 `luci-i18n-homeproxy-zh-cn`。

          ### 手动上传 APK 安装 / 升级（备选）

          1. 先按上面的方式添加 `homeproxy-custom.pem` 公钥。
          2. 下载 `homeproxy-custom_all.apk`。
          3. 进入「系统」->「软件包」，上传 `homeproxy-custom_all.apk` 安装 / 升级。

          `homeproxy-custom_all.apk` 已内置简体中文翻译，不需要再安装单独的翻译包。

          如果从旧的 `luci-app-homeproxy` 迁移时遇到 `breaks: world[luci-app-homeproxy><...]` 报错，请使用一键安装命令完成迁移。
          EOF

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          title="HomeProxy Custom ${tag#custom-}"
          assets=(
            homeproxy-custom_all.apk
            Packages.adb
            homeproxy-custom.pem
          )
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" \
              --title "$title" \
              --notes-file RELEASE_NOTES.md \
              --latest
          fi
