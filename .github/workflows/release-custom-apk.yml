name: Release custom APK

permissions:
  contents: write

on:
  push:
    tags:
      - 'custom-*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source tree
        uses: actions/checkout@v6

      - name: Checkout apk
        uses: actions/checkout@v6
        with:
          repository: 'alpinelinux/apk-tools'
          path: 'apk-tools'
          fetch-depth: 0
          ref: 'b5a31c0d865342ad80be10d68f1bb3d3ad9b0866'

      - name: Checkout po2lmo
        uses: actions/checkout@v6
        with:
          repository: 'openwrt/luci'
          path: 'po2lmo'
          sparse-checkout: 'modules/luci-base/src'

      - name: Setup dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E rm -rf /var/lib/man-db/auto-update
          sudo -E apt-get update -qq
          sudo -E apt-get install -y build-essential curl fakeroot libssl-dev lua5.1 meson ninja-build

          pushd apk-tools
          meson setup build \
            -Db_lto=true \
            -Dcompressed-help=false \
            -Ddocs=disabled \
            -Dhelp=enabled \
            -Dlua_version=5.1 \
            -Ddefault_library=static \
            -Durl_backend=wget \
            -Dzstd=false \
            -Dpython=disabled \
            -Dtests=disabled \
            -Dcrypto_backend=openssl
          ninja -C build
          sudo -E meson install -C build --strip
          popd

          pushd po2lmo/modules/luci-base/src
          make po2lmo
          sudo -E install -m0755 -s po2lmo /usr/local/bin/po2lmo
          popd

          curl -fLO "https://raw.githubusercontent.com/openwrt/openwrt/master/scripts/ipkg-build"
          sudo install -m0755 ipkg-build /usr/local/bin/ipkg-build

      - name: Build APK
        env:
          HOMEPROXY_APK_SIGN_KEY: ${{ secrets.HOMEPROXY_APK_SIGN_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEPROXY_APK_SIGN_KEY}" ]; then
            echo "HOMEPROXY_APK_SIGN_KEY secret is required" >&2
            exit 1
          fi
          umask 077
          printf '%s\n' "${HOMEPROXY_APK_SIGN_KEY}" > homeproxy-custom.key
          openssl pkey -in homeproxy-custom.key -pubout -out homeproxy-custom.pem
          pushd .github
          CUSTOM_PKG_NAME="homeproxy-custom" \
            CUSTOM_PKG_DESCRIPTION="HomeProxy 修改版，内置简体中文；支持 SS2022 + ShadowTLS、Selector 路由节点、路由规则直选节点、HomeProxy 配置备份 / 恢复、默认开启 Clash API、MetaCubeXD 面板入口，并隐藏 SS2022 + ShadowTLS 生成的cfg-xxx-out-shadowtls 中间层节点。" \
            APK_SIGN_KEY="../homeproxy-custom.key" \
            fakeroot bash build-ipk.sh apk "snapshot"
          popd

      - name: Prepare release assets
        run: |
          set -euo pipefail
          app_apk_file="$(ls .github/homeproxy-custom_*.apk | head -n 1)"
          cp "$app_apk_file" homeproxy-custom_all.apk

          mkdir -p apk-keys
          cp homeproxy-custom.pem apk-keys/

          apk --keys-dir "$PWD/apk-keys" mkndx \
            --sign-key homeproxy-custom.key \
            --description "HomeProxy Custom ${GITHUB_REF_NAME}" \
            --pkgname-spec '${name}_all.apk' \
            --output Packages.adb \
            homeproxy-custom_all.apk
          cat > RELEASE_NOTES.md <<'EOF'
          ## HomeProxy Custom

          基于 https://github.com/immortalwrt/homeproxy 的自定义版本。

          ### 本版本变更

          - 修复跨路由恢复配置后 Clash API 继续监听旧 LAN 地址，导致 sing-box 无法启动的问题
          EOF

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          title="HomeProxy Custom ${tag#custom-}"
          assets=(
            homeproxy-custom_all.apk
            Packages.adb
            homeproxy-custom.pem
          )
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" \
              --title "$title" \
              --notes-file RELEASE_NOTES.md \
              --latest
          fi
